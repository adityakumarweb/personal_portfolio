<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | webwithaditya</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main);">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 class="gradient-text" style="margin-bottom: 20px;">Welcome Back</h2>
        <form id="login-form" style="display: grid; gap: 15px;">
            <input type="email" placeholder="Email" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-main); color: var(--text-main);">
            <input type="password" placeholder="Password" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-main); color: var(--text-main);">
            <button class="btn btn-primary" style="justify-content: center;">Login</button>
        </form>
        <p style="margin-top: 20px;">Don't have an account? <a href="signup.html" style="color: var(--primary);">Sign Up</a></p>
        <a href="../index.html" style="display: block; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); text-decoration: none;">Back to Home</a>
    </div>
</body>
</html>
