<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | webwithaditya</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main);">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 class="gradient-text" style="margin-bottom: 20px;">Join the Community</h2>
        <form id="signup-form" style="display: grid; gap: 15px;">
            <input type="text" placeholder="Full Name" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-main); color: var(--text-main);">
            <input type="email" placeholder="Email" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-main); color: var(--text-main);">
            <input type="password" placeholder="Password" required style="padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-main); color: var(--text-main);">
            <button class="btn btn-primary" style="justify-content: center;">Sign Up</button>
        </form>
        <p style="margin-top: 20px;">Already have an account? <a href="login.html" style="color: var(--primary);">Login</a></p>
        <p style="margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">Want to chat? <a href="https://t.me/webwithaditya" target="_blank" style="color: var(--primary); font-weight: 500; text-decoration: none;">Join our Telegram Group</a></p>
        <a href="../index.html" style="display: block; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); text-decoration: none;">Back to Home</a>
    </div>
</body>
</html>
